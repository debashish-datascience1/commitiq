<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CommitIQ</title>
  <link rel="manifest" href="/static/manifest.json" />
  <meta name="theme-color" content="#238636" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CommitIQ" />
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 720px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: #161b22;
      border-left: 1px solid #30363d;
      border-right: 1px solid #30363d;
    }

    /* ── Header ── */
    .header {
      padding: 16px 20px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .header-icon {
      width: 36px;
      height: 36px;
      background: #238636;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .header-text h1 {
      font-size: 16px;
      font-weight: 600;
      color: #e6edf3;
    }

    .header-text p {
      font-size: 12px;
      color: #7d8590;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #3fb950;
      border-radius: 50%;
      margin-left: auto;
      box-shadow: 0 0 6px #3fb950;
    }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

    .msg-row {
      display: flex;
      gap: 8px;
      max-width: 88%;
    }

    .msg-row.bot { align-self: flex-start; }
    .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }

    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      margin-top: 2px;
    }

    .avatar.bot { background: #238636; }
    .avatar.user { background: #1f6feb; }

    .bubble {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bubble.bot {
      background: #21262d;
      border: 1px solid #30363d;
      border-top-left-radius: 4px;
      color: #e6edf3;
    }

    .bubble.user {
      background: #1f6feb;
      border-top-right-radius: 4px;
      color: #ffffff;
    }

    /* Inline formatting from bot messages */
    .bubble strong { font-weight: 600; color: #58a6ff; }
    .bubble.user strong { color: #ffffff; }
    .bubble em { font-style: italic; color: #a5d6ff; }
    .bubble.user em { color: rgba(255,255,255,0.85); }
    .bubble code {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 1px 5px;
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 13px;
    }
    .bubble a {
      color: #58a6ff;
      text-decoration: none;
    }
    .bubble a:hover { text-decoration: underline; }

    /* ── Typing indicator ── */
    .typing-row {
      display: flex;
      gap: 8px;
      align-self: flex-start;
      align-items: center;
    }

    .typing-bubble {
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 12px;
      border-top-left-radius: 4px;
      padding: 12px 16px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .dot {
      width: 6px;
      height: 6px;
      background: #7d8590;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    /* ── Quick reply chips ── */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 0 16px 8px;
      flex-shrink: 0;
    }

    .chip {
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 13px;
      color: #58a6ff;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    .chip:hover {
      background: #1f6feb22;
      border-color: #1f6feb;
    }

    /* ── Input area ── */
    .input-area {
      padding: 12px 16px 16px;
      border-top: 1px solid #30363d;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
      background: #161b22;
    }

    textarea {
      flex: 1;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 10px;
      color: #e6edf3;
      font-size: 14px;
      font-family: inherit;
      padding: 10px 14px;
      resize: none;
      outline: none;
      min-height: 42px;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.15s;
    }

    textarea:focus { border-color: #388bfd; }
    textarea::placeholder { color: #7d8590; }

    button#send-btn {
      width: 42px;
      height: 42px;
      background: #238636;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    button#send-btn:hover { background: #2ea043; }
    button#send-btn:disabled { background: #21262d; cursor: not-allowed; color: #7d8590; }

    /* ── Welcome screen ── */
    .welcome {
      text-align: center;
      padding: 40px 20px;
      color: #7d8590;
    }

    .welcome .icon { font-size: 48px; margin-bottom: 12px; }
    .welcome h2 { font-size: 18px; color: #e6edf3; margin-bottom: 8px; }
    .welcome p { font-size: 14px; line-height: 1.6; }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-icon">🤖</div>
    <div class="header-text">
      <h1>CommitIQ</h1>
      <p>GitHub assistant — no WhatsApp needed</p>
    </div>
    <div class="status-dot" title="Online"></div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="welcome">
      <div class="icon">🚀</div>
      <h2>Welcome to CommitIQ</h2>
      <p>Browse your repos, manage issues,<br>and make commits — right here in the browser.</p>
    </div>
  </div>

  <!-- Quick reply chips -->
  <div class="chips" id="chips"></div>

  <!-- Input -->
  <div class="input-area">
    <textarea
      id="input"
      placeholder="Type a message or number…"
      rows="1"
      autocomplete="off"
      spellcheck="false"
    ></textarea>
    <button id="send-btn" title="Send (Enter)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>

</div>

<script>
  // Unique session id per browser tab (persists for the tab's lifetime)
  const SESSION_ID = "web-" + Math.random().toString(36).slice(2);

  const messagesEl = document.getElementById("messages");
  const inputEl    = document.getElementById("input");
  const sendBtn    = document.getElementById("send-btn");
  const chipsEl    = document.getElementById("chips");

  // Quick-reply chip definitions per state keyword found in bot messages
  const CHIP_MAP = [
    { match: "1 — Yes, let's work",      chips: ["1 — Yes, let's work!", "2 — No, not today"] },
    { match: "number of the repo",        chips: [] },
    { match: "1 — View & manage issues",  chips: ["1 — Issues", "2 — Browse files", "3 — Branches", "4 — Create PR", "0 — Back"] },
    { match: "issue number",              chips: ["A — Apply AI fix", "N — New issue", "0 — Back"] },
    { match: "AI analysis",              chips: ["A — Apply AI fix", "0 — Back"] },
    { match: "Create a New Issue",        chips: [] },
    { match: "description of the issue",  chips: ["skip"] },
    { match: "1 — Add a blank line",      chips: ["1 — Blank line", "2 — Comment", "3 — AI Auto-Fix", "0 — Back"] },
    { match: "AI Auto-Fix",               chips: [] },
    { match: "commit message",            chips: [] },
    { match: "AI Fix Ready",              chips: ["0 — Cancel"] },
    { match: "1 to list branches",        chips: ["1 — List branches", "2 — New branch", "0 — Back"] },
    { match: "Select the head branch",    chips: [] },
    { match: "Select the base branch",    chips: [] },
    { match: "PR title",                  chips: [] },
    { match: "1 to view issues",          chips: ["1 — Issues", "2 — Browse files", "3 — Branches", "4 — Create PR", "0 — Back"] },
  ];

  function setChips(botText) {
    chipsEl.innerHTML = "";
    for (const { match, chips } of CHIP_MAP) {
      if (botText.includes(match.replace(/\*/g, ""))) {
        chips.forEach(label => {
          const num = label.split(" ")[0];
          const chip = document.createElement("button");
          chip.className = "chip";
          chip.textContent = label;
          chip.onclick = () => sendMessage(num);
          chipsEl.appendChild(chip);
        });
        return;
      }
    }
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function formatText(text) {
    // Convert WhatsApp-style *bold*, _italic_, `code`, and bare URLs to HTML
    return text
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/\*(.*?)\*/g, "<strong>$1</strong>")
      .replace(/_(.*?)_/g, "<em>$1</em>")
      .replace(/`(.*?)`/g, "<code>$1</code>")
      .replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
  }

  function addMessage(text, role) {
    // Remove welcome screen on first message
    const welcome = messagesEl.querySelector(".welcome");
    if (welcome) welcome.remove();

    const row = document.createElement("div");
    row.className = `msg-row ${role}`;

    const avatar = document.createElement("div");
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === "bot" ? "🤖" : "👤";

    const bubble = document.createElement("div");
    bubble.className = `bubble ${role}`;
    bubble.innerHTML = formatText(text);

    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollToBottom();
    return bubble;
  }

  function showTyping() {
    const row = document.createElement("div");
    row.className = "typing-row";
    row.id = "typing";

    const avatar = document.createElement("div");
    avatar.className = "avatar bot";
    avatar.textContent = "🤖";

    const bubble = document.createElement("div");
    bubble.className = "typing-bubble";
    bubble.innerHTML = `<div class="dot"></div><div class="dot"></div><div class="dot"></div>`;

    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollToBottom();
  }

  function hideTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  async function sendMessage(text) {
    text = (text || inputEl.value).trim();
    if (!text) return;

    inputEl.value = "";
    inputEl.style.height = "auto";
    chipsEl.innerHTML = "";
    sendBtn.disabled = true;

    addMessage(text, "user");
    showTyping();

    try {
      const res = await fetch("/api/message", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id: SESSION_ID, message: text }),
      });

      const data = await res.json();
      hideTyping();

      let lastBotText = "";
      for (const msg of data.responses) {
        addMessage(msg, "bot");
        lastBotText = msg;
      }

      if (lastBotText) setChips(lastBotText);

    } catch (err) {
      hideTyping();
      addMessage("❌ Could not reach the server. Is Flask running?", "bot");
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  // Send on Enter (Shift+Enter for newline)
  inputEl.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Auto-resize textarea
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
  });

  sendBtn.addEventListener("click", () => sendMessage());

  // Greet the user on load
  window.addEventListener("load", () => sendMessage("hi"));

  // Register service worker for PWA installability
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
</script>
</body>
</html>
